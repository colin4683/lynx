syntax = "proto3";

package monitor;

service SystemMonitor {
    rpc GetSystemInfo (SystemInfoRequest) returns (Response);
    rpc ReportMetrics (MetricsRequest) returns (Response);
    rpc StreamMetrics (stream MetricsRequest) returns (Response);
    rpc ReportSystemctl (SystemctlRequest) returns (Response);
    rpc RegisterGPUs (GpuRequest) returns (Response);
    rpc ReportGPUMetrics (GpuMetricsRequest) returns (Response);
    rpc RegisterContainers (ContainerRequest) returns (Response);
    rpc ReportContainerMetrics (ContainerMetricsRequest) returns (Response);
}

message SystemInfoRequest {
    string hostname = 1;
    string os = 2;
    uint64 uptime_seconds = 3;
    string kernel_version = 4;
    string cpu_model = 5;
    uint32 cpu_count = 6;
}

message MetricsRequest {
    CpuStats cpu_stats = 8;
    MemoryStats memory_stats = 9;
    repeated DiskStats disk_stats = 10;
    repeated Component components = 11;
    NetworkStats network_stats = 12;
    LoadAverage load_average = 13;
}

message GpuRequest {
    repeated GpuInfo gpus = 1;
}

message GpuMetricsRequest {
    repeated GpuMetrics gpu_metrics = 1;
}

message ContainerRequest {
    repeated ContainerInfo containers = 1;
}

message ContainerMetricsRequest {
    repeated ContainerMetrics container_metrics = 1;
}

message SystemctlRequest {
    repeated SystemService services = 1;
}

message SystemService {
    string service_name = 1;
    string description = 2;
    uint64 pid = 3;
    string state = 4;
    string cpu = 5;
    string memory = 6;
}

message SystemctlResponse {
    string status = 1;
    string message = 2;
}

message GpuResponse {
    string status = 1;
    string message = 2;
}


message ContainerResponse {
    string status = 1;
    string message = 2;
}

message Response {
    string status = 1;
    string message = 2;
}

message CpuStats {
    double usage_percent = 1;
}

message MemoryStats {
    uint64 total_kb = 1;
    uint64 used_kb = 2;
    uint64 free_kb = 3;
}

message DiskStats {
    string name = 1;
    int32 total_space = 2;
    int32 used_space = 3;
    string unit = 4;
    double read_bytes = 5;
    double write_bytes = 6;
    string mount_point = 7;
}

message LoadAverage {
    double one_minute = 1;
    double five_minutes = 2;
    double fifteen_minutes = 3;
}

message NetworkStats {
    uint64 in = 1;
    uint64 out = 2;
}

message Component {
    string label = 1;
    float temperature = 2;
}

message MetricsResponse {
    string status = 1;
    string message = 2;
}

message SystemInfoResponse {
    string status = 1;
    string message = 2;

}

message GpuMetrics {
    uint32 gpu_index = 1;
    double utilization = 2;
    uint64 memory_used_mb = 3;
    double temperature = 4;
    double power = 5;
}

message GpuInfo {
    uint32 gpu_index = 1;
    string uuid = 2;
    string name = 3;
    string pci_bus = 4;
    string driver = 5;
    uint64 memory_total_mb = 6;
}

message ContainerMetrics {
    string docker_id = 1;
    double cpu_usage = 2;
    double memory_usage = 3;
}

message ContainerInfo {
    string docker_id = 1;
    string name = 2;
    string state = 3;
}